<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THE HILL - Reset Password</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="login-wrapper">
    <!-- Left Side - Image -->
    <div class="login-image">
      <div class="image-content">
        <img src="https://i.pinimg.com/1200x/38/d7/5b/38d75b61577fa7a3695893f7ab4f8a9c.jpg" alt="Fashion Collection">
      </div>
    </div>

    <!-- Right Side - Form -->
    <div class="login-form-container">
      <div class="login-form-content">
        <h2 style="font-size: 24px; margin-bottom: 10px; color: #000;">Đặt Lại Mật Khẩu</h2>
        <p style="font-size: 12px; color: #888; margin-bottom: 20px;">Nhập mật khẩu mới của bạn.</p>

        <!-- Messages -->
        <div id="successMessage" class="message message--success" role="alert"></div>
        <div id="errorMessage" class="message message--error" role="alert"></div>

        <!-- Form -->
        <form id="resetForm" novalidate>
          <div class="form-group">
            <label for="newPassword">Mật Khẩu Mới*</label>
            <input 
              type="password" 
              id="newPassword" 
              placeholder="" 
              required
              autocomplete="new-password">
          </div>

          <div class="form-group">
            <label for="confirmPassword">Xác Nhận Mật Khẩu*</label>
            <input 
              type="password" 
              id="confirmPassword" 
              placeholder="" 
              required
              autocomplete="new-password">
          </div>

          <button type="submit" class="login-btn" id="submitButton" disabled>
            Đặt Lại Mật Khẩu
          </button>

          <div style="text-align: center; margin-top: 15px;">
            <a href="login.html" style="font-size: 12px; color: #333; text-decoration: none;">← Quay lại đăng nhập</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "http://localhost:8083";
    const RESET_PASSWORD_API_URL = `${API_BASE}/api/auth/reset-password`;

    const email = sessionStorage.getItem("resetEmail");
    const resetKey = sessionStorage.getItem("resetKey");

    const newPassEl = document.getElementById("newPassword");
    const confirmEl = document.getElementById("confirmPassword");
    const btn = document.getElementById("submitButton");
    const form = document.getElementById("resetForm");
    const errorMessage = document.getElementById("errorMessage");
    const successMessage = document.getElementById("successMessage");

    let submitting = false;

    function displayMessage(element, text, isError = false) {
      const otherMessage = isError ? successMessage : errorMessage;
      element.textContent = text;
      element.style.display = text ? 'block' : 'none';
      otherMessage.style.display = 'none';
    }

    function validate() {
      const np = (newPassEl.value || "").trim();
      const cp = (confirmEl.value || "").trim();
      btn.disabled = submitting || !np || !cp || np !== cp || np.length < 6;
    }

    // Check reset session
    if (!email || !resetKey) {
      displayMessage(errorMessage, "Phiên làm việc không có. Vui lòng yêu cầu đặt lại lại.", true);
      setTimeout(() => {
        window.location.href = "forgot-password.html";
      }, 2000);
    }

    newPassEl.addEventListener("input", validate);
    confirmEl.addEventListener("input", validate);

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      displayMessage(errorMessage, '');
      displayMessage(successMessage, '');

      if (submitting) return;

      const np = (newPassEl.value || "").trim();
      const cp = (confirmEl.value || "").trim();

      if (!np || !cp) {
        displayMessage(errorMessage, "Vui lòng nhập mật khẩu và xác nhận mật khẩu.", true);
        return;
      }
      if (np !== cp) {
        displayMessage(errorMessage, "Mật khẩu không khớp.", true);
        return;
      }

      const weakPasswords = [
        "123456", "password", "123456789", "12345", "12345678", "qwerty", "abc123", "football", "monkey", "letmein"
      ];
      if (weakPasswords.includes(np.toLowerCase())) {
        displayMessage(errorMessage, "Mật khẩu quá yếu. Vui lòng chọn mật khẩu mạnh hơn.", true);
        return;
      }
      if (!/[a-zA-Z]/.test(np) || !/[0-9]/.test(np)) {
        displayMessage(errorMessage, "Mật khẩu phải chứa cả chữ cái và số.", true);
        return;
      }
      if (np.length < 6) {
        displayMessage(errorMessage, "Mật khẩu phải có ít nhất 6 ký tự.", true);
        return;
      }

      submitting = true;
      validate();
      displayMessage(successMessage, "Đang đặt lại mật khẩu...");

      try {
        const res = await fetch(RESET_PASSWORD_API_URL, {
          method: "POST",
          mode: "cors",
          credentials: "omit",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, resetKey, newPassword: np })
        });

        let bodyText = "";
        let bodyJson = null;
        try {
          bodyText = await res.text();
          try { bodyJson = JSON.parse(bodyText); } catch (_) {}
        } catch (_) {}

        if (res.ok) {
          displayMessage(successMessage, bodyJson?.message || "Mật khẩu đã được đặt lại thành công! Chuyển hướng...");

          sessionStorage.removeItem("resetEmail");
          sessionStorage.removeItem("resetKey");

          setTimeout(() => window.location.href = "login.html", 900);
          return;
        }

        if (res.status === 403) {
          sessionStorage.removeItem("resetKey");
          sessionStorage.removeItem("resetEmail");
          window.location.href = "login.html";
          return;
        }

        const errMsg =
          bodyJson?.message ||
          (bodyText && bodyText.length < 200 ? bodyText : "") ||
          `Đặt lại không thành công (HTTP ${res.status}).`;

        displayMessage(errorMessage, errMsg, true);

      } catch (err) {
        console.error(err);
        displayMessage(errorMessage, "Không thể kết nối tới máy chủ. Vui lòng kiểm tra API chạy trên cổng 8083.", true);
      } finally {
        submitting = false;
        validate();
      }
    });

    validate();
  </script>
</body>
</html>

  <script>
    const API_BASE = "http://localhost:8083";
    const RESET_PASSWORD_API_URL = `${API_BASE}/api/auth/reset-password`;

    const email = sessionStorage.getItem("resetEmail");
    const resetKey = sessionStorage.getItem("resetKey");

    const newPassEl = document.getElementById("newPassword");
    const confirmEl = document.getElementById("confirmPassword");
    const btn = document.getElementById("submitButton");
    const msg = document.getElementById("messageBox");

    // chống double click / double request
    let submitting = false;

    function showMessage(text, isError) {
      msg.style.display = "block";
      msg.className = "msg " + (isError ? "error" : "ok");
      msg.textContent = text;
    }

    function hideMessage() {
      msg.style.display = "none";
      msg.textContent = "";
    }

    function validate() {
      const np = (newPassEl.value || "").trim();
      const cp = (confirmEl.value || "").trim();
      btn.disabled = submitting || !np || !cp || np !== cp || np.length < 6;
    }

    // kiểm tra session reset
    if (!email || !resetKey) {
      alert("Reset session not found. Please request reset again.");
      window.location.href = "forgot-password.html";
    }

    newPassEl.addEventListener("input", validate);
    confirmEl.addEventListener("input", validate);

    // Enter để submit (không double)
    [newPassEl, confirmEl].forEach(el => {
      el.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          btn.click();
        }
      });
    });

    btn.addEventListener("click", async (e) => {
      e.preventDefault();
      hideMessage();

      if (submitting) return;

      const np = (newPassEl.value || "").trim();
      const cp = (confirmEl.value || "").trim();

      if (!np || !cp) {
        showMessage("Please enter password and confirm password.", true);
        return;
      }
      if (np !== cp) {
        showMessage("Passwords do not match.", true);
        return;
      }

      // Danh sách mật khẩu yếu phổ biến
      const weakPasswords = [
        "123456", "password", "123456789", "12345", "12345678", "qwerty", "abc123", "football", "monkey", "letmein", "111111", "1234", "1234567", "dragon", "baseball", "sunshine", "iloveyou", "trustno1", "princess", "admin", "welcome", "666666", "654321", "superman", "1qaz2wsx", "qwertyuiop"
      ];
      if (weakPasswords.includes(np.toLowerCase())) {
        showMessage("Password is too common or weak. Please choose a stronger password.", true);
        return;
      }
      // Yêu cầu có cả chữ cái và số
      if (!/[a-zA-Z]/.test(np) || !/[0-9]/.test(np)) {
        showMessage("Password must contain both letters and numbers.", true);
        return;
      }
      if (np.length < 6) {
        showMessage("Password must be at least 6 characters.", true);
        return;
      }

      submitting = true;
      validate();
      showMessage("Resetting password...", false);

      try {
        const res = await fetch(RESET_PASSWORD_API_URL, {
          method: "POST",
          mode: "cors",
          credentials: "omit",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, resetKey, newPassword: np })
        });

        // đọc body an toàn: có thể JSON hoặc text
        let bodyText = "";
        let bodyJson = null;
        try {
          bodyText = await res.text();
          try { bodyJson = JSON.parse(bodyText); } catch (_) {}
        } catch (_) {}

        if (res.ok) {
          // SUCCESS
          showMessage(bodyJson?.message || "Password reset successfully! Redirecting to login...", false);

          // clear session reset để tránh submit lại
          sessionStorage.removeItem("resetEmail");
          sessionStorage.removeItem("resetKey");

          setTimeout(() => window.location.href = "login.html", 900);
          return;
        }

        // Nếu 403 nhưng bạn nói DB vẫn đổi được -> đa phần là do request thứ 2 / hoặc bị chặn ở Security/CORS.
        // Mình sẽ show rõ ràng thay vì báo fail chung chung.
        if (res.status === 403) {
          // Nếu đã đổi mật khẩu thành công (resetKey không còn hợp lệ), chuyển về login luôn
          // Thử login bằng mật khẩu mới, nếu thành công thì chuyển luôn
          // Hoặc: Nếu đã gửi request và nhận 403, xóa resetKey và chuyển về login
          sessionStorage.removeItem("resetKey");
          sessionStorage.removeItem("resetEmail");
          window.location.href = "login.html";
          return;
        }

        // các status khác
        const errMsg =
          bodyJson?.message ||
          (bodyText && bodyText.length < 200 ? bodyText : "") ||
          `Reset failed (HTTP ${res.status}).`;

        showMessage(errMsg, true);

      } catch (err) {
        console.error(err);
        showMessage("Cannot connect to server. Please check API is running on port 8083.", true);
      } finally {
        submitting = false;
        validate();
      }
    });

    validate();
  </script>
</body>
</html>
