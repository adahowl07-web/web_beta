<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders – The Hill Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="loading" id="loading"><div class="spinner"></div></div>

    <div class="admin-layout">
        <!-- ── Sidebar ───────────────────────────────────────────────────── -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <h2>The Hill</h2>
                <span>Admin Dashboard</span>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section-label">Main Menu</div>
                <a href="dashboard.html" class="nav-item"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="products.html"  class="nav-item"><i class="fas fa-box"></i> Products</a>
                <a href="orders.html"    class="nav-item"><i class="fas fa-shopping-cart"></i> Orders</a>
            </nav>
            <div class="sidebar-footer">
                <button class="logout-btn" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </aside>

        <!-- ── Main ─────────────────────────────────────────────────────── -->
        <div class="main-content">
            <div class="topbar">
                <div class="topbar-title">Orders</div>
                <div class="topbar-user">
                    <i class="fas fa-user-shield"></i>
                    <span>Administrator</span>
                </div>
            </div>

            <div class="content-area">
                <!-- Page Header -->
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Order Management</h1>
                        <p class="page-subtitle">View and manage customer orders</p>
                    </div>
                    <button class="btn btn-secondary" onclick="loadOrders(activeStatus)">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                </div>

                <div class="alert" id="alert"></div>

                <!-- Status filter tabs -->
                <div class="filter-tabs" id="statusTabs">
                    <button class="filter-tab active" data-status="">
                        <i class="fas fa-list"></i> All
                    </button>
                    <button class="filter-tab" data-status="pending">
                        <i class="fas fa-clock"></i> Pending
                    </button>
                    <button class="filter-tab" data-status="paid">
                        <i class="fas fa-check-circle"></i> Paid
                    </button>
                    <button class="filter-tab" data-status="processing">
                        <i class="fas fa-cogs"></i> Processing
                    </button>
                    <button class="filter-tab" data-status="shipped">
                        <i class="fas fa-shipping-fast"></i> Shipped
                    </button>
                    <button class="filter-tab" data-status="delivered">
                        <i class="fas fa-box-open"></i> Delivered
                    </button>
                    <button class="filter-tab" data-status="failed">
                        <i class="fas fa-times-circle"></i> Failed
                    </button>
                </div>

                <div class="card">
                    <div class="card-header">
                        <span class="card-title" id="orderCount">All Orders</span>
                    </div>
                    <div class="card-body" style="padding: 0;">
                        <div class="table-responsive">
                            <table>
                                <thead>
                                    <tr>
                                        <th style="width:60px">ID</th>
                                        <th>Customer</th>
                                        <th style="width:130px">Phone</th>
                                        <th style="width:160px">Total</th>
                                        <th style="width:120px">Status</th>
                                        <th style="width:130px">Date</th>
                                    </tr>
                                </thead>
                                <tbody id="ordersBody">
                                    <tr><td colspan="6" style="text-align:center;color:#9ca3af;padding:40px">Loading...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
    <script>
        requireAdminLogin();

        let activeStatus = '';

        // ── Status filter tabs ─────────────────────────────────────────────────
        document.getElementById('statusTabs').addEventListener('click', e => {
            const btn = e.target.closest('.filter-tab');
            if (!btn) return;
            document.querySelectorAll('#statusTabs .filter-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeStatus = btn.dataset.status;
            loadOrders(activeStatus);
        });

        // ── Status badge helpers ───────────────────────────────────────────────
        const STATUS_CONFIG = {
            pending   : { cls: 'badge-warning',  label: 'Pending'    },
            paid      : { cls: 'badge-success',  label: 'Paid'       },
            processing: { cls: 'badge-info',     label: 'Processing' },
            shipped   : { cls: 'badge-purple',   label: 'Shipped'    },
            delivered : { cls: 'badge-success',  label: 'Delivered'  },
            failed    : { cls: 'badge-danger',   label: 'Failed'     },
        };

        function statusBadge(status) {
            const cfg = STATUS_CONFIG[status] || { cls: 'badge-info', label: status };
            return `<span class="badge ${cfg.cls}">${cfg.label}</span>`;
        }

        // ── Load orders ────────────────────────────────────────────────────────
        async function loadOrders(status) {
            showLoading();
            try {
                const qs  = status ? `?status=${status}` : '';
                const res = await apiFetch(`/orders${qs}`);

                if (!res) return;
                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    showAlert(data.error || 'Failed to load orders.', 'error');
                    return;
                }

                const orders  = await res.json();
                const tbody   = document.getElementById('ordersBody');
                const label   = document.getElementById('orderCount');
                const tabLabel = document.querySelector('#statusTabs .filter-tab.active')?.textContent.trim() || 'All';

                label.textContent = `${tabLabel} Orders (${orders.length})`;

                if (orders.length === 0) {
                    tbody.innerHTML = `
                        <tr><td colspan="6">
                            <div class="empty-state">
                                <i class="fas fa-shopping-cart"></i>
                                <h3>No orders found</h3>
                                <p>Orders placed by customers will appear here.</p>
                            </div>
                        </td></tr>`;
                    return;
                }

                tbody.innerHTML = orders.map(o => `
                    <tr>
                        <td>
                            <span style="font-weight:600;color:#374151">#${o.id}</span>
                            ${o.app_trans_id ? `<br><span style="font-size:0.7rem;color:#9ca3af">${o.app_trans_id}</span>` : ''}
                        </td>
                        <td>
                            <div style="font-weight:500">${o.customer_name || '<span style="color:#9ca3af">—</span>'}</div>
                            ${o.customer_email ? `<div style="font-size:0.78rem;color:#6b7280">${o.customer_email}</div>` : ''}
                        </td>
                        <td style="color:#6b7280">${o.customer_phone || '—'}</td>
                        <td style="font-weight:700;color:#111827">${formatPrice(o.total_amount)}</td>
                        <td>${statusBadge(o.status)}</td>
                        <td style="color:#6b7280;font-size:0.8rem">
                            ${new Date(o.created_at).toLocaleDateString('vi-VN')}
                            <br>
                            <span style="font-size:0.75rem">${new Date(o.created_at).toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' })}</span>
                        </td>
                    </tr>
                `).join('');
            } catch {
                showAlert('Failed to load orders. Please check your database connection.', 'error');
            } finally {
                hideLoading();
            }
        }

        loadOrders('');
    </script>
</body>
</html>
