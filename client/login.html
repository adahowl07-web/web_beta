<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'ELEGANCE - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-wrapper">
        <!-- Left Side - Image -->
        <div class="login-image">
            <div class="image-content">
                <img src="https://i.pinimg.com/1200x/38/d7/5b/38d75b61577fa7a3695893f7ab4f8a9c.jpg" alt="Fashion Collection">
            </div>
        </div>

        <!-- Right Side - Form -->
        <div class="login-form-container">
            <div class="login-form-content">
                <!-- Tab Navigation -->
                <div class="form-tabs">
                    <button class="form-tab active" data-tab="login">Đăng Nhập</button>
                    <button class="form-tab" data-tab="signup">Đăng Ký</button>
                </div>

                <!-- Messages -->
                <div id="successMessage" class="message message--success" role="alert"></div>
                <div id="errorMessage" class="message message--error" role="alert"></div>

                <!-- Login Form -->
                <form id="loginForm" class="form-content active" data-form="login" novalidate>
                    <!-- Email Input -->
                    <div class="form-group">
                        <label for="email">Email*</label>
                        <input 
                            type="email" 
                            id="email" 
                            placeholder="" 
                            required
                            autocomplete="email">
                    </div>

                    <!-- Password Input -->
                    <div class="form-group">
                        <label for="password">Mật Khẩu*</label>
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="" 
                            required
                            autocomplete="current-password">
                    </div>

                    <!-- Forgot Password Link -->
                    <div class="form-forgot">
                        <a href="forgot-password.html">Quên mật khẩu?</a>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="login-btn" id="submitButton" disabled>
                        Đăng nhập
                    </button>
                </form>

                <!-- Signup Form -->
                <form id="signupForm" class="form-content" data-form="signup" novalidate>
                    <!-- Name Input -->
                    <div class="form-group">
                        <label for="signup-name">Họ Tên*</label>
                        <input 
                            type="text" 
                            id="signup-name" 
                            placeholder="" 
                            required>
                    </div>

                    <!-- Email Input -->
                    <div class="form-group">
                        <label for="signup-email">Email*</label>
                        <input 
                            type="email" 
                            id="signup-email" 
                            placeholder="" 
                            required
                            autocomplete="email">
                    </div>

                    <!-- Password Input -->
                    <div class="form-group">
                        <label for="signup-password">Mật Khẩu*</label>
                        <input 
                            type="password" 
                            id="signup-password" 
                            placeholder="" 
                            required
                            autocomplete="new-password">
                    </div>

                    <!-- Confirm Password -->
                    <div class="form-group">
                        <label for="signup-confirm">Xác Nhận Mật Khẩu*</label>
                        <input 
                            type="password" 
                            id="signup-confirm" 
                            placeholder="" 
                            required>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="login-btn" id="signupButton" disabled>
                        Đăng ký
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
</body>
</html>
