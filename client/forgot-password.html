<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THE HILL - Forgot Password</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="login-wrapper">
    <!-- Left Side - Image -->
    <div class="login-image">
      <div class="image-content">
        <img src="https://i.pinimg.com/1200x/38/d7/5b/38d75b61577fa7a3695893f7ab4f8a9c.jpg" alt="Fashion Collection">
      </div>
    </div>

    <!-- Right Side - Form -->
    <div class="login-form-container">
      <div class="login-form-content">
        <!-- Messages -->
        <div id="successMessage" class="message message--success" role="alert"></div>
        <div id="errorMessage" class="message message--error" role="alert"></div>

        <!-- STEP 1: SEND CODE -->
        <div id="step1">
          <h2 style="font-size: 24px; margin-bottom: 10px; color: #000;">Quên Mật Khẩu</h2>
          <p style="font-size: 12px; color: #888; margin-bottom: 20px;">Nhập email của bạn. Chúng tôi sẽ gửi mã xác minh 6 chữ số đến hộp thư của bạn.</p>

          <div class="form-group">
            <label for="email">Email*</label>
            <input id="email" class="form-group input" type="email" placeholder="" required />
          </div>
          <button id="sendBtn" class="login-btn">Gửi Mã</button>

          <div style="text-align: center; margin-top: 15px;">
            <a href="login.html" style="font-size: 12px; color: #333; text-decoration: none;">← Quay lại đăng nhập</a>
          </div>
        </div>

        <!-- STEP 2: VERIFY CODE -->
        <div id="step2" style="display:none;">
          <h2 style="font-size: 24px; margin-bottom: 10px; color: #000;">Xác Minh Mã</h2>
          <p style="font-size: 12px; color: #888; margin-bottom: 20px;">Nhập mã 6 chữ số được gửi tới email của bạn.</p>

          <div class="form-group">
            <label for="token">Mã Xác Minh*</label>
            <input id="token" class="form-group input" type="text" placeholder="" maxlength="6" />
          </div>

          <div style="display: flex; gap: 10px;">
            <button id="verifyBtn" class="login-btn" style="flex: 1;">Xác Minh</button>
            <button id="backBtn" class="login-btn" style="flex: 1; background: #666;">Quay Lại</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "http://localhost:8083/api/auth";

    const emailEl = document.getElementById("email");
    const tokenEl = document.getElementById("token");

    const step1 = document.getElementById("step1");
    const step2 = document.getElementById("step2");

    const sendBtn = document.getElementById("sendBtn");
    const verifyBtn = document.getElementById("verifyBtn");
    const backBtn = document.getElementById("backBtn");

    const errorMessage = document.getElementById("errorMessage");
    const successMessage = document.getElementById("successMessage");

    function displayMessage(element, text, isError = false) {
      const otherMessage = isError ? successMessage : errorMessage;
      element.textContent = text;
      element.style.display = text ? 'block' : 'none';
      otherMessage.style.display = 'none';
    }

    function normEmail(s) {
      return (s || "").trim().toLowerCase();
    }

    sendBtn.addEventListener("click", async () => {
      displayMessage(errorMessage, '');
      displayMessage(successMessage, '');

      const email = normEmail(emailEl.value);
      if (!email) {
        displayMessage(errorMessage, 'Vui lòng nhập email.', true);
        return;
      }

      sendBtn.disabled = true;
      displayMessage(successMessage, 'Đang gửi mã...');

      try {
        const res = await fetch(`${API_BASE}/forgot-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });

        const data = await res.json().catch(() => ({}));

        if (res.ok) {
          displayMessage(successMessage, data.message || "Mã đã được gửi! Vui lòng kiểm tra email.");
          setTimeout(() => {
            step1.style.display = "none";
            step2.style.display = "block";
            tokenEl.focus();
          }, 500);
        } else {
          displayMessage(errorMessage, data.message || "Không thể gửi mã.", true);
        }
      } catch (e) {
        displayMessage(errorMessage, "Không thể kết nối tới máy chủ.", true);
        console.error(e);
      } finally {
        sendBtn.disabled = false;
      }
    });

    verifyBtn.addEventListener("click", async () => {
      displayMessage(errorMessage, '');
      displayMessage(successMessage, '');

      const email = normEmail(emailEl.value);
      const token = (tokenEl.value || "").trim();

      if (!email) {
        displayMessage(errorMessage, "Email bị thiếu. Vui lòng quay lại.", true);
        return;
      }
      if (!token || token.length !== 6) {
        displayMessage(errorMessage, "Vui lòng nhập mã 6 chữ số.", true);
        return;
      }

      verifyBtn.disabled = true;
      displayMessage(successMessage, 'Đang xác minh...');

      try {
        const res = await fetch(`${API_BASE}/verify-reset-code`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, token })
        });

        const data = await res.json().catch(() => ({}));

        if (res.ok && data.resetKey) {
          displayMessage(successMessage, data.message || "Mã đã được xác minh!");
          sessionStorage.setItem("resetEmail", email);
          sessionStorage.setItem("resetKey", data.resetKey);

          setTimeout(() => {
            window.location.href = "reset-password.html";
          }, 300);
        } else {
          displayMessage(errorMessage, data.message || "Mã không hợp lệ hoặc đã hết hạn.", true);
        }
      } catch (e) {
        displayMessage(errorMessage, "Không thể kết nối tới máy chủ.", true);
        console.error(e);
      } finally {
        verifyBtn.disabled = false;
      }
    });

    backBtn.addEventListener("click", () => {
      step2.style.display = "none";
      step1.style.display = "block";
      tokenEl.value = "";
      displayMessage(errorMessage, '');
      displayMessage(successMessage, '');
      emailEl.focus();
    });
  </script>
</body>
</html>

  <script>
    const API_BASE = "http://localhost:8083/api/auth";

    const emailEl = document.getElementById("email");
    const tokenEl = document.getElementById("token");

    const step1 = document.getElementById("step1");
    const step2 = document.getElementById("step2");

    const sendBtn = document.getElementById("sendBtn");
    const verifyBtn = document.getElementById("verifyBtn");
    const backBtn = document.getElementById("backBtn");

    const sendMsgErr = document.getElementById("sendMsgErr");
    const sendMsgOk  = document.getElementById("sendMsgOk");
    const verifyMsgErr = document.getElementById("verifyMsgErr");
    const verifyMsgOk  = document.getElementById("verifyMsgOk");

    function show(el, msg) {
      el.style.display = "block";
      el.textContent = msg;
    }
    function hide(el) {
      el.style.display = "none";
      el.textContent = "";
    }
    function normEmail(s) {
      return (s || "").trim().toLowerCase();
    }

    // IMPORTANT: không kiểm tra reset session ở đây.
    // resetEmail/resetKey chỉ được tạo sau khi VERIFY thành công.

    sendBtn.addEventListener("click", async () => {
      hide(sendMsgErr); hide(sendMsgOk);

      const email = normEmail(emailEl.value);
      if (!email) {
        show(sendMsgErr, "Please enter your email.");
        return;
      }

      sendBtn.disabled = true;
      show(sendMsgOk, "Sending code...");

      try {
        const res = await fetch(`${API_BASE}/forgot-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });

        const data = await res.json().catch(() => ({}));

        if (res.ok) {
          show(sendMsgOk, data.message || "Code sent! Please check your email.");
          // chuyển sang step 2
          step1.style.display = "none";
          step2.style.display = "block";
          tokenEl.focus();
        } else {
          hide(sendMsgOk);
          show(sendMsgErr, data.message || "Failed to send code.");
        }
      } catch (e) {
        hide(sendMsgOk);
        show(sendMsgErr, "Cannot connect to server (8083).");
        console.error(e);
      } finally {
        sendBtn.disabled = false;
      }
    });

    verifyBtn.addEventListener("click", async () => {
      hide(verifyMsgErr); hide(verifyMsgOk);

      const email = normEmail(emailEl.value);
      const token = (tokenEl.value || "").trim();

      if (!email) {
        show(verifyMsgErr, "Email is missing. Please go back.");
        return;
      }
      if (!token || token.length !== 6) {
        show(verifyMsgErr, "Please enter the 6-digit code.");
        return;
      }

      verifyBtn.disabled = true;
      show(verifyMsgOk, "Verifying code...");

      try {
        const res = await fetch(`${API_BASE}/verify-reset-code`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, token })
        });

        const data = await res.json().catch(() => ({}));

        if (res.ok && data.resetKey) {
          show(verifyMsgOk, data.message || "Code verified!");

          // lưu session để reset-password.html dùng
          sessionStorage.setItem("resetEmail", email);
          sessionStorage.setItem("resetKey", data.resetKey);

          // chuyển qua trang reset password
          setTimeout(() => {
            window.location.href = "reset-password.html";
          }, 300);
        } else {
          hide(verifyMsgOk);
          show(verifyMsgErr, data.message || "Invalid or expired code.");
        }

      } catch (e) {
        hide(verifyMsgOk);
        show(verifyMsgErr, "Cannot connect to server (8083).");
        console.error(e);
      } finally {
        verifyBtn.disabled = false;
      }
    });

    backBtn.addEventListener("click", () => {
      // quay về step 1 (gửi lại)
      step2.style.display = "none";
      step1.style.display = "block";
      tokenEl.value = "";
      hide(verifyMsgErr); hide(verifyMsgOk);
      emailEl.focus();
    });
  </script>
</body>
</html>
