<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE HILL - Sign Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-wrapper">
        <!-- Left Side - Image -->
        <div class="login-image">
            <div class="image-content">
                <img src="https://i.pinimg.com/1200x/38/d7/5b/38d75b61577fa7a3695893f7ab4f8a9c.jpg" alt="Fashion Collection">
            </div>
        </div>

        <!-- Right Side - Form -->
        <div class="login-form-container">
            <div class="login-form-content">
                <!-- Tab Navigation -->
                <div class="form-tabs">
                    <button class="form-tab" data-tab="login">Đăng Nhập</button>
                    <button class="form-tab active" data-tab="signup">Đăng Ký</button>
                </div>

                <!-- Messages -->
                <div id="successMessage" class="message message--success" role="alert"></div>
                <div id="errorMessage" class="message message--error" role="alert"></div>

                <!-- Signup Form -->
                <form id="signupForm" class="form-content active" data-form="signup" novalidate>
                    <!-- Name Input -->
                    <div class="form-group">
                        <label for="signup-name">Họ Tên*</label>
                        <input 
                            type="text" 
                            id="signup-name" 
                            placeholder="" 
                            required>
                    </div>

                    <!-- Email Input -->
                    <div class="form-group">
                        <label for="signup-email">Email*</label>
                        <input 
                            type="email" 
                            id="signup-email" 
                            placeholder="" 
                            required
                            autocomplete="email">
                    </div>

                    <!-- Password Input -->
                    <div class="form-group">
                        <label for="signup-password">Mật Khẩu*</label>
                        <input 
                            type="password" 
                            id="signup-password" 
                            placeholder="" 
                            required
                            autocomplete="new-password">
                    </div>

                    <!-- Confirm Password -->
                    <div class="form-group">
                        <label for="signup-confirm">Xác Nhận Mật Khẩu*</label>
                        <input 
                            type="password" 
                            id="signup-confirm" 
                            placeholder="" 
                            required>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="login-btn" id="signupButton" disabled>
                        Đăng ký
                    </button>

                    <!-- Login Link -->
                    <div class="form-forgot">
                        <a href="login.html">Đã có tài khoản? Đăng nhập</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
    <script>
        // Redirect to login page behavior
        document.addEventListener('DOMContentLoaded', function() {
            const loginTab = document.querySelector('[data-tab="login"]');
            if (loginTab) {
                loginTab.addEventListener('click', function(e) {
                    e.preventDefault();
                    window.location.href = 'login.html';
                });
            }
        });
    </script>
</body>
</html>

    <script>
        // SỬA PORT: Đã cập nhật thành 8083
        const REGISTER_API_URL = 'http://localhost:8083/api/auth/register'; 

        function isValidEmail(email) {
            const re = /^(([^<>()[\]\\.,;:\s@"]+(\.[^<>()[\]\\.,;:\s@"]+)*)|(".+"))@((\[[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\])|(([a-zA-Z\-0-9]+\.)+[a-zA-Z]{2,}))$/;
            return re.test(String(email).toLowerCase());
        }
        function displayMessage(element, text, isError) {
            element.textContent = text;
            element.style.display = 'block';
            if (isError) { document.getElementById('successMessage').style.display = 'none'; } else { document.getElementById('errorMessage').style.display = 'none'; }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const signupForm = document.getElementById('signupForm');
            const successMessage = document.getElementById('successMessage');
            const errorMessage = document.getElementById('errorMessage');
            const usernameInput = document.getElementById('username');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const submitButton = document.getElementById('submitButton'); 

            function validateForm() {
                const isUserFilled = usernameInput.value.trim() !== '';
                const isEmailFilled = emailInput.value.trim() !== '';
                const isPassFilled = passwordInput.value.trim() !== '';
                submitButton.disabled = !(isUserFilled && isEmailFilled && isPassFilled);
            }
            validateForm(); 
            usernameInput.addEventListener('input', validateForm);
            emailInput.addEventListener('input', validateForm);
            passwordInput.addEventListener('input', validateForm);


            signupForm.addEventListener('submit', async function(event) {
                event.preventDefault(); 
                displayMessage(errorMessage, '', true);
                displayMessage(successMessage, 'Processing registration...', false);

                const username = usernameInput.value.trim();
                const email = emailInput.value.trim();
                const password = passwordInput.value.trim();


                // Danh sách mật khẩu yếu phổ biến
                const weakPasswords = [
                    "123456", "password", "123456789", "12345", "12345678", "qwerty", "abc123", "football", "monkey", "letmein", "111111", "1234", "1234567", "dragon", "baseball", "sunshine", "iloveyou", "trustno1", "princess", "admin", "welcome", "666666", "654321", "superman", "1qaz2wsx", "qwertyuiop"
                ];
                if (weakPasswords.includes(password.toLowerCase())) {
                    displayMessage(errorMessage, 'Password is too common or weak. Please choose a stronger password.', true);
                    return;
                }
                // Yêu cầu: ít nhất 6 ký tự, có chữ cái, số, chữ hoa, ký tự đặc biệt
                if (
                    password.length < 6 ||
                    !/[a-zA-Z]/.test(password) ||
                    !/[0-9]/.test(password) ||
                    !/[A-Z]/.test(password) ||
                    !/[!@#$%^&*()_+\-=[\]{};':"\\|,.<>/?]/.test(password)
                ) {
                    displayMessage(errorMessage, 'Password must be at least 6 characters, contain a number, a letter, an uppercase letter, and a special character.', true);
                    return;
                }
                if (!isValidEmail(email)) {
                    displayMessage(errorMessage, 'Vui lòng kiểm tra định dạng email.', true);
                    return;
                }

                submitButton.disabled = true;

                const registerData = { username, email, password };
                
                try {
                    const response = await fetch(REGISTER_API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(registerData)
                    });

                    const data = await response.json();

                    if (response.ok) {
                        // Đăng ký thành công (Mã 200/201)
                        displayMessage(successMessage, 'Sign up successful! Redirecting to log in...', false);
                        
                        document.body.style.animation = 'fadeOut 0.5s ease-out forwards';
                        setTimeout(function() {
                            window.location.href = 'login.html'; 
                        }, 1000); 

                    } else {
                        // Đăng ký thất bại (Lỗi 400/500)
                        let errorMsg = 'Registration failed. Please try again.';
                        if (response.status === 409) {
                            errorMsg = data.message || 'This email is already registered. Please log in.';
                        } else if (data && data.message) {
                             // Spring Boot thường trả về message lỗi từ server
                            errorMsg = data.message; 
                        }
                        displayMessage(errorMessage, errorMsg, true);
                        submitButton.disabled = false;
                    }
                } catch (error) {
                    console.error('Network Error:', error);
                    displayMessage(errorMessage, 'Cannot connect to Server (Port 8084). Check if the Java Server is running.', true);
                    submitButton.disabled = false;
                }
            });
        });
        document.write('<style>@keyframes fadeOut { from {opacity: 1;} to {opacity: 0;} }</style>');
    </script>
</body>
</html>
